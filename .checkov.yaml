# Checkov configuration for terraform-provider-azurecaf
#
# Suppressions are scoped to specific rules with documented justifications so
# that any future deviations are explicit and reviewable.

skip-check:
  # CKV_GHA_7: "GitHub Actions workflow_dispatch inputs MUST be empty."
  # This is an SLSA L3 build-reproducibility constraint. Our agentic workflow
  # lock files (.github/workflows/*.lock.yml) are auto-generated by `gh aw
  # compile` (v0.72.1+), which emits an internal `aw_context` input on every
  # `workflow_dispatch` trigger to propagate caller context between agent
  # workflows. The lock files carry a "DO NOT EDIT" header, so inline
  # `# checkov:skip` directives would be lost on the next compile. The repo is
  # not a SLSA-tracked build-artifact producer, so the rule does not apply.
  - CKV_GHA_7
