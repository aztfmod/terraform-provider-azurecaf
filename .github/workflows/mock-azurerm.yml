name: Mock azurerm validation

# Validate that every CAF-generated name for resources changed in this PR
# is accepted by the corresponding azurerm_* resource schema, using
# `terraform test` with `mock_provider azurerm`. No Azure credentials needed.
#
# Scope: diff-only on PRs (only resources changed in resourceDefinition.json).
# Full sweep is run weekly by .github/workflows/weekly-mock-azurerm.md.

on:
  pull_request:
    branches: [main]
    paths:
      - 'resourceDefinition.json'
      - 'azurecaf/**'
      - 'scripts/mock-test/**'
      - '.github/workflows/mock-azurerm.yml'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Test scope'
        required: true
        default: 'changed'
        type: choice
        options: [changed, all]

permissions:
  contents: read

jobs:
  mock-azurerm:
    name: Mock azurerm validation (changed resources)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # required so `git diff origin/main...HEAD` works

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.15"
          terraform_wrapper: false

      - name: Cache azurerm plugin downloads
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-plugin-cache-${{ runner.os }}-azurerm-v4

      - name: Build provider
        run: make build
        env:
          CHECKPOINT_DISABLE: '1'

      - name: Ensure base ref is fetched
        run: git fetch --no-tags --depth=1 origin main

      - name: Run mock-azurerm validation
        env:
          CHECKPOINT_DISABLE: '1'
          TF_IN_AUTOMATION: '1'
        run: |
          if [[ "${{ github.event.inputs.scope }}" == "all" ]]; then
            make test_mock_azurerm_all
          else
            make test_mock_azurerm_changed
          fi

      - name: Upload report and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-azurerm-report
          path: |
            /tmp/azurecaf-mock/report.tsv
            /tmp/azurecaf-mock/logs/
          if-no-files-found: ignore
          retention-days: 14
